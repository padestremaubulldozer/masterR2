services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: master_r2
      POSTGRES_PASSWORD: master_r2
      POSTGRES_DB: master_r2
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U master_r2"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./back
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://master_r2:master_r2@db:5432/master_r2
      FRONT_DIR: /app/front
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./front:/app/front:ro

volumes:
  pgdata:
